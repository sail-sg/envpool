name: Release PyPI Wheel

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    env:
      BAZELOPT: --repository_cache=/root/.cache/envpool-bazel-repo --disk_cache=/root/.cache/envpool-bazel-disk
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v3
      - name: Restore Bazel common caches
        uses: actions/cache/restore@v4
        with:
          path: |
            /root/.cache/bazelisk
            /root/.cache/envpool-bazel-repo
          key: release-common-v2-manylinux_2_28_x86_64-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            release-common-v2-manylinux_2_28_x86_64-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            release-common-v2-manylinux_2_28_x86_64-${{ hashFiles('.bazelversion') }}-
      - name: Restore Bazel disk cache
        uses: actions/cache/restore@v4
        with:
          path: /root/.cache/envpool-bazel-disk
          key: release-disk-v2-manylinux_2_28_x86_64-py${{ matrix.python-version }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            release-disk-v2-manylinux_2_28_x86_64-py${{ matrix.python-version }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            release-disk-v2-manylinux_2_28_x86_64-py${{ matrix.python-version }}-${{ hashFiles('.bazelversion') }}-
      - name: Install build dependencies
        run: |
          dnf install -y git curl wget zsh gcc gcc-c++ make tmux golang java-17-openjdk-devel qt5-qtbase-devel qt5-qtdeclarative-devel
          dnf clean all
          ln -sf "$(qmake-qt5 -query QT_INSTALL_HEADERS)" /usr/include/qt
          go install github.com/bazelbuild/bazelisk@latest
          ln -sf /root/go/bin/bazelisk /usr/local/bin/bazelisk
          ln -sf /root/go/bin/bazelisk /usr/local/bin/bazel
      - name: Set up Python ${{ matrix.python-version }}
        shell: bash
        run: |
          case "${{ matrix.python-version }}" in
            3.11) PYBIN=/opt/python/cp311-cp311/bin ;;
            3.12) PYBIN=/opt/python/cp312-cp312/bin ;;
            3.13) PYBIN=/opt/python/cp313-cp313/bin ;;
            *) echo "unsupported python version: ${{ matrix.python-version }}" >&2; exit 1 ;;
          esac
          echo "$PYBIN" >> "$GITHUB_PATH"
          "$PYBIN/python3" --version
      - name: Build
        run: |
          make pypi-wheel
          pip3 install dist/*.whl --force-reinstall
      - name: Test
        run: |
          make release-test
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.python-version }}
          path: wheelhouse/
          if-no-files-found: error
      - name: Save Bazel common caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            /root/.cache/bazelisk
            /root/.cache/envpool-bazel-repo
          key: release-common-v2-manylinux_2_28_x86_64-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-py${{ matrix.python-version }}-${{ github.run_id }}
      - name: Save Bazel disk cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: /root/.cache/envpool-bazel-disk
          key: release-disk-v2-manylinux_2_28_x86_64-py${{ matrix.python-version }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}

  publish:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: artifact
          merge-multiple: true
      - name: Move files so the next action can find them
        run: |
          mkdir dist && mv artifact/* dist/
          ls dist/
      - name: Publish distribution to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
