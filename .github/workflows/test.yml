name: Bazel Build and Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: write
  contents: read

jobs:
  test-linux-x64:
    name: Test (linux-x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      MUJOCO_GL: egl
      EGL_PLATFORM: surfaceless
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 cmake lcov ninja-build swig qtbase5-dev qtdeclarative5-dev libegl1-mesa-dev libopengl-dev
          qmake_bin="$(command -v qmake-qt5 || command -v qmake)"
          qt_include_dir="$("$qmake_bin" -query QT_INSTALL_HEADERS)"
          sudo ln -sfn "$qt_include_dir" /usr/include/qt
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Coverage
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" \
            BAZEL_TEST_TARGETS="//..." bazel-coverage
          mkdir -p coverage
          cp bazel-out/_coverage/_coverage_report.dat coverage/lcov.info
          python3 scripts/coverage_summary.py \
            --lcov coverage/lcov.info \
            --output-dir coverage \
            --summary-file coverage/summary.md \
            --badge-file coverage/coverage-badge.svg \
            --genhtml-lcov-file coverage/lcov.genhtml.info \
            --repo-root "$GITHUB_WORKSPACE"
      - name: Publish coverage summary
        run: cat coverage/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Build coverage site
        run: |
          genhtml coverage/lcov.genhtml.info \
            --prefix "$GITHUB_WORKSPACE" \
            --branch-coverage \
            --ignore-errors negative,category \
            --legend \
            --output-directory coverage/site \
            --title "EnvPool coverage report"
          cp coverage/coverage-badge.svg coverage/site/coverage-badge.svg
      - name: Upload coverage artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux-x64-${{ github.sha }}
          path: coverage
          if-no-files-found: warn
      - name: Upload coverage Pages artifact
        if: ${{ github.event_name == 'push' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: coverage/site
      - name: Save Bazel caches
        id: save-bazel-caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Prune older Bazel caches
        if: ${{ always() && !cancelled() && (steps.save-bazel-caches.outcome == 'success' || steps.save-bazel-caches.outcome == 'skipped') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/prune_actions_caches.py --repo "${{ github.repository }}" --prefix "bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-"
  test-linux-arm64:
    name: Test (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      MUJOCO_GL: egl
      EGL_PLATFORM: surfaceless
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 cmake lcov ninja-build swig qtbase5-dev qtdeclarative5-dev libegl1-mesa-dev libopengl-dev
          qmake_bin="$(command -v qmake-qt5 || command -v qmake)"
          qt_include_dir="$("$qmake_bin" -query QT_INSTALL_HEADERS)"
          sudo ln -sfn "$qt_include_dir" /usr/include/qt
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Test
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" \
            BAZEL_TEST_TARGETS="//..." bazel-test
      - name: Save Bazel caches
        id: save-bazel-caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Prune older Bazel caches
        if: ${{ always() && !cancelled() && (steps.save-bazel-caches.outcome == 'success' || steps.save-bazel-caches.outcome == 'skipped') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/prune_actions_caches.py --repo "${{ github.repository }}" --prefix "bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-"
  test-macos:
    name: Test (macos)
    runs-on: macos-14
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install macOS dependencies
        run: |
          brew install ninja swig qt@5
          python -m pip install "cmake<4"
          CMAKE_BIN_DIR="$(python -c "import cmake; print(cmake.CMAKE_BIN_DIR)")"
          CMAKE_BIN="$CMAKE_BIN_DIR/cmake"
          echo "$CMAKE_BIN_DIR" >> "$GITHUB_PATH"
          sudo ln -sfn "$CMAKE_BIN" /usr/local/bin/cmake
          PATH="$CMAKE_BIN_DIR:$PATH" cmake --version
          sudo ln -sfn "$(brew --prefix ninja)/bin/ninja" /usr/local/bin/ninja
          echo "BAZEL_RULES_QT_DIR=$(brew --prefix qt@5)" >> "$GITHUB_ENV"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Test
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" bazel-test
      - name: Save Bazel caches
        id: save-bazel-caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Prune older Bazel caches
        if: ${{ always() && !cancelled() && (steps.save-bazel-caches.outcome == 'success' || steps.save-bazel-caches.outcome == 'skipped') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/prune_actions_caches.py --repo "${{ github.repository }}" --prefix "bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-"
  test-windows:
    name: Test (windows)
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      BAZEL_SH: C:/Program Files/Git/usr/bin/bash.exe
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      MESA_GL_VERSION_OVERRIDE: 4.5COMPAT
      MSYS2_ARG_CONV_EXCL: "*"
      MSYS_NO_PATHCONV: "1"
      USE_BAZEL_VERSION: "8.6.0"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Shorten temp path
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\tmp -Force | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "TMP=C:\tmp"
          Add-Content -Path $env:GITHUB_ENV -Value "TEMP=C:\tmp"
          Add-Content -Path $env:GITHUB_ENV -Value "TMPDIR=C:\tmp"
      - name: Install Windows dependencies
        shell: pwsh
        run: |
          choco install -y cmake make ninja strawberryperl swig
      - name: Create Mesa directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path (Join-Path $env:GITHUB_WORKSPACE ".mesa") -Force | Out-Null
      - name: Install Mesa software OpenGL
        uses: f3d-app/install-mesa-windows-action@v1
        with:
          path: ${{ github.workspace }}\.mesa
      - name: Export Mesa location
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "ENVPOOL_DLL_DIR=$env:GITHUB_WORKSPACE\.mesa"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:GITHUB_WORKSPACE\.mesa"
      - name: Install Qt 5
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: "win64_msvc2019_64"
          set-env: "true"
      - name: Export Qt location
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "BAZEL_RULES_QT_DIR=$env:QT_ROOT_DIR"
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:QT_ROOT_DIR "bin")
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\usr\bin"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        shell: pwsh
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $HOME "go/bin")
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pin CMake 3
        shell: pwsh
        run: |
          python -m pip install "cmake<4"
          $cmakeBinDir = python -c "import cmake; print(cmake.CMAKE_BIN_DIR)"
          Add-Content -Path $env:GITHUB_PATH -Value $cmakeBinDir
          & (Join-Path $cmakeBinDir "cmake.exe") --version
      - name: Test
        shell: bash
        run: |
          repo_cache=$(cygpath -am "$HOME/.cache/envpool-bazel-repo")
          disk_cache=$(cygpath -am "$HOME/.cache/envpool-bazel-disk")
          set +e
          make \
            BAZELOPT="--repository_cache=$repo_cache --disk_cache=$disk_cache" \
            BAZEL_TEST_TARGETS="//envpool/mujoco/..." \
            bazel-test
          status=$?
          if [ "$status" -ne 0 ]; then
            for runfiles_dir in \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/core \
              bazel-bin/envpool/mujoco/mujoco_gym_align_test.exe.runfiles/envpool/envpool/core \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/mujoco/robotics
            do
              printf '==== %s\n' "$runfiles_dir"
              find "$runfiles_dir" -maxdepth 1 -type f -print | sort || true
            done
            printf '==== shared_thread_pool / robotics_envpool in robotics_test runfiles\n'
            find bazel-bin/envpool/mujoco/robotics_test.exe.runfiles \
              \( -name 'shared_thread_pool*' -o -name 'robotics_envpool*' \) \
              -print | sort || true
            printf '==== shared_thread_pool symlink details\n'
            ls -l \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/core/shared_thread_pool.pyd \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/mujoco/robotics_envpool.pyd \
              || true
            readlink \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/core/shared_thread_pool.pyd \
              || true
            readlink \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/mujoco/robotics_envpool.pyd \
              || true
            printf '==== robotics_test MANIFEST entries\n'
            grep -E 'shared_thread_pool|robotics_envpool' \
              bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/MANIFEST \
              || true
            printf '==== python importlib diagnostics\n'
            python - <<'PY' || true
          import importlib.util
          from pathlib import Path

          paths = [
              Path("bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/core/shared_thread_pool.pyd"),
              Path("bazel-bin/envpool/mujoco/robotics_test.exe.runfiles/envpool/envpool/mujoco/robotics_envpool.pyd"),
          ]
          for path in paths:
              print(f"path={path}")
              print(f"  exists={path.exists()}")
              print(f"  is_file={path.is_file()}")
              print(f"  is_symlink={path.is_symlink()}")
              if path.is_symlink():
                  print(f"  readlink={path.readlink()}")

          print(
              "find_spec(envpool.core.shared_thread_pool)="
              f"{importlib.util.find_spec('envpool.core.shared_thread_pool')}"
          )
          print(
              "find_spec(envpool.mujoco.robotics_envpool)="
              f"{importlib.util.find_spec('envpool.mujoco.robotics_envpool')}"
          )
          PY
          fi
          exit "$status"
  deploy-coverage-pages:
    name: Deploy coverage page
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    needs:
      - test-linux-x64
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
