name: Bazel Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-linux:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            bazel-test-targets: //...
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            bazel-test-targets: //...
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      CLANG_TIDY_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
      CLANG_TIDY_HEAD_SHA: ${{ github.sha }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 cmake ninja-build swig qtbase5-dev qtdeclarative5-dev
          qmake_bin="$(command -v qmake-qt5 || command -v qmake)"
          qt_include_dir="$("$qmake_bin" -query QT_INSTALL_HEADERS)"
          sudo ln -sfn "$qt_include_dir" /usr/include/qt
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Test
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" \
            BAZEL_TEST_TARGETS="${{ matrix.bazel-test-targets }}" bazel-test
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
  test-macos:
    runs-on: macos-14
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install macOS dependencies
        run: |
          brew install cmake ninja swig qt@5
          echo "BAZEL_RULES_QT_DIR=$(brew --prefix qt@5)" >> "$GITHUB_ENV"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Test
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" bazel-test
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
  test-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      BAZEL_SH: C:/Program Files/Git/usr/bin/bash.exe
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      MSYS2_ARG_CONV_EXCL: "*"
      MSYS_NO_PATHCONV: "1"
      USE_BAZEL_VERSION: "8.6.0"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Windows dependencies
        shell: pwsh
        run: |
          choco install -y cmake make ninja strawberryperl swig
      - name: Install Qt 5
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: "win64_msvc2019_64"
          set-env: "true"
      - name: Export Qt location
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "BAZEL_RULES_QT_DIR=$env:QT_ROOT_DIR"
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:QT_ROOT_DIR "bin")
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Git\usr\bin"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        shell: pwsh
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $HOME "go/bin")
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test
        shell: bash
        run: |
          repo_cache=$(cygpath -am "$HOME/.cache/envpool-bazel-repo")
          disk_cache=$(cygpath -am "$HOME/.cache/envpool-bazel-disk")
          make BAZELOPT="--repository_cache=$repo_cache --disk_cache=$disk_cache" bazel-test
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}

  release-linux-arm64:
    name: Release Test (linux-arm64)
    runs-on: ubuntu-24.04-arm
    container: quay.io/pypa/manylinux_2_28_aarch64
    timeout-minutes: 120
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
      - name: Install build dependencies
        run: |
          dnf install -y git curl wget zsh gcc gcc-c++ cmake make ninja-build tmux golang java-17-openjdk-devel qt5-qtbase-devel qt5-qtdeclarative-devel
          dnf clean all
          ln -sf "$(qmake-qt5 -query QT_INSTALL_HEADERS)" /usr/include/qt
          go install github.com/bazelbuild/bazelisk@latest
          ln -sf /root/go/bin/bazelisk /usr/local/bin/bazelisk
          ln -sf /root/go/bin/bazelisk /usr/local/bin/bazel
      - name: Set up Python 3.12
        shell: bash
        run: |
          PYBIN=/opt/python/cp312-cp312/bin
          echo "$PYBIN" >> "$GITHUB_PATH"
          "$PYBIN/python3" --version
      - name: Build
        run: |
          rm -rf dist wheelhouse
          make PYPI_WHEEL_PLAT=manylinux_2_28_aarch64 pypi-wheel
          python -m pip install wheelhouse/*.whl --force-reinstall
      - name: Test
        run: |
          make release-test
