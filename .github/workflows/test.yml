name: Bazel Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      CLANG_TIDY_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
      CLANG_TIDY_HEAD_SHA: ${{ github.sha }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore pip cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pip
          key: pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}
          restore-keys: |
            pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}-
            pip-test-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 swig qtbase5-dev qtdeclarative5-dev
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Test
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" bazel-test
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Save pip cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pip
          key: pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}-${{ github.run_id }}

  test-macos:
    runs-on: macos-14
    timeout-minutes: 120
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore pip cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}
          restore-keys: |
            pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}-
            pip-test-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Install macOS dependencies
        run: |
          brew install swig qt@5
          echo "BAZEL_RULES_QT_DIR=$(brew --prefix qt@5)" >> "$GITHUB_ENV"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Test
        run: |
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" bazel-test
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Save pip cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}-${{ github.run_id }}

  test-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      BAZEL_SH: C:/Program Files/Git/bin/bash.exe
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      MSYS2_ARG_CONV_EXCL: "*"
      MSYS_NO_PATHCONV: "1"
      USE_BAZEL_VERSION: "8.6.0"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore pip cache
        uses: actions/cache/restore@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}
          restore-keys: |
            pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}-
            pip-test-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Windows dependencies
        shell: pwsh
        run: |
          choco install -y make ninja strawberryperl swig
      - name: Install Qt 5
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: "win64_msvc2019_64"
          set-env: "true"
      - name: Export Qt location
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "BAZEL_RULES_QT_DIR=$env:QT_ROOT_DIR"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        shell: pwsh
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $HOME "go/bin")
      - name: Test
        shell: pwsh
        run: |
          Copy-Item third_party/pip_requirements/requirements-dev-lock.txt third_party/pip_requirements/requirements.txt -Force
          $repoCache = Join-Path $HOME ".cache/envpool-bazel-repo"
          $diskCache = Join-Path $HOME ".cache/envpool-bazel-disk"
          bazelisk test --test_output=all --repository_cache=$repoCache --disk_cache=$diskCache //... --config=test --spawn_strategy=local --color=yes
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-test-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Save pip cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-test-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-dev-lock.txt') }}-${{ github.run_id }}
