name: macOS Wheel Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  macos-wheel:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      CACHE_BRANCH: ${{ github.head_ref || github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Cancel previous run
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore pip cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-release-lock.txt') }}
          restore-keys: |
            pip-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-release-lock.txt') }}-
            pip-wheel-v1-${{ runner.os }}-${{ runner.arch }}-
      - name: Install macOS dependencies
        run: |
          brew install swig qt@5
          echo "BAZEL_RULES_QT_DIR=$(brew --prefix qt@5)" >> "$GITHUB_ENV"
      - name: Restore Bazel caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}
          restore-keys: |
            bazel-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.DEFAULT_BRANCH }}-
            bazel-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Build macOS wheel
        run: |
          rm -rf dist
          make BAZELOPT="--repository_cache=$HOME/.cache/envpool-bazel-repo --disk_cache=$HOME/.cache/envpool-bazel-disk" bazel-release
      - name: Smoke install wheel
        run: |
          python3 -m pip install dist/*.whl --force-reinstall
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python3 - <<'PY'
          import envpool

          env = envpool.make("CartPole-v1", env_type="gym", num_envs=1)
          obs, info = env.reset()
          print(envpool.__version__)
          print(type(obs).__name__, getattr(obs, "shape", None))
          print(sorted(info.keys()))
          PY
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-wheel-cp312
          path: dist/*.whl
          if-no-files-found: error
      - name: Save Bazel caches
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/envpool-bazel-repo
            ~/.cache/envpool-bazel-disk
          key: bazel-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bazelversion') }}-${{ env.CACHE_BRANCH }}-${{ github.run_id }}
      - name: Save pip cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-wheel-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/pip_requirements/requirements-release-lock.txt') }}-${{ github.run_id }}
